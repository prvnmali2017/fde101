<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetailCo Support Assistant — Pilot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0052cc;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.75rem; opacity: 0.85; background: rgba(255,255,255,0.15); padding: 0.2rem 0.6rem; border-radius: 999px; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #0052cc;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: white;
      border: 1px solid #dfe1e6;
      border-bottom-left-radius: 4px;
    }
    .msg .meta {
      font-size: 0.7rem;
      color: #6b778c;
      margin-top: 0.5rem;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0 1.5rem 0.5rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    .suggestions button {
      background: white;
      border: 1px solid #dfe1e6;
      border-radius: 999px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: #0052cc;
    }
    .suggestions button:hover { background: #ebf2ff; }
    form {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      background: white;
      border-top: 1px solid #dfe1e6;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    form input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #dfe1e6;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }
    form input:focus { border-color: #0052cc; box-shadow: 0 0 0 2px rgba(0,82,204,0.15); }
    form button {
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 1.25rem;
      font-weight: 600;
      cursor: pointer;
    }
    form button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>RetailCo Support Assistant</h1>
    <span>Pilot v0.1</span>
  </header>

  <div id="chat">
    <div class="msg assistant">
      Hi! I'm the RetailCo internal support assistant. I can answer policy questions and look up order status.
      <div class="meta">Try a suggested question below</div>
    </div>
  </div>

  <div class="suggestions">
    <button onclick="ask('What is the return policy?')">Return policy</button>
    <button onclick="ask('How long does standard shipping take?')">Shipping times</button>
    <button onclick="ask('What is the status of order ORD-1001?')">Order ORD-1001</button>
    <button onclick="ask('Can I return an opened item?')">Opened items</button>
  </div>

  <form id="form">
    <input id="input" type="text" placeholder="Ask a support question..." autocomplete="off" />
    <button type="submit" id="send">Send</button>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const history = [];

    function addMessage(role, text, meta) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      if (meta) {
        const m = document.createElement("div");
        m.className = "meta";
        m.textContent = meta;
        div.appendChild(m);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function ask(message) {
      addMessage("user", message);
      sendBtn.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, history }),
        });
        const data = await res.json();
        history.push({ role: "user", content: message });
        history.push({ role: "assistant", content: data.reply });

        let meta = `Mode: ${data.mode}`;
        if (data.sources?.length) meta += ` · Sources: ${data.sources.join(", ")}`;
        if (data.tool_calls?.length) meta += ` · Tools: ${data.tool_calls.map(t => t.tool).join(", ")}`;
        addMessage("assistant", data.reply, meta);
      } catch (err) {
        addMessage("assistant", "Error connecting to API. Is the server running?");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      input.value = "";
      ask(msg);
    });
  </script>
</body>
</html>
